{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet"  href="{% static 'style.css' %}">
</head>
<body{% if background_image %} style="background-image: linear-gradient(rgba(16, 24, 39, 0.35), rgba(16, 24, 39, 0.55)), url('{{ background_image }}');"{% endif %}>
    <div class="weather-container">
        <div class="search-box">
            <h1>Weather App</h1>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="city" placeholder="Enter city name">
                <button type="submit">Get Weather</button>
            </form>
        </div>

        <div class="weather-result">
            <h2>{{ city }}</h2>
            <p>Description: {{ description }}</p>
            <p>Temperature: {{ temp }}&deg;C</p>
            <p>Icon: {{ icon }}</p>
            <p>Date: {{ date }}</p>

            <div class="weather-icon">
                <img src="https://openweathermap.org/img/wn/{{ icon }}@2x.png" width="100" height="100" alt="Weather icon">
            </div>

            <p>Day: {{ day }}</p>
        </div>
    </div>
</body>
</html>
